name: Sync Publish Bundle

on:
  push:
    paths-ignore:
      - "publish/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Rebuild publish bundle
        run: node scripts/build-publish.mjs

      - name: Commit updated publish bundle
        shell: bash
        run: |
          git add -A -f publish

          if git diff --cached --quiet -- publish; then
            echo "Publish bundle is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync publish bundle"
          git push