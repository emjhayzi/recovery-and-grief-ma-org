name: Publish Build Check

on:
  push:
  pull_request:

jobs:
  build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build publish directory
        run: node scripts/build-publish.mjs
